services:
  - type: web
    name: sati-timsa
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PGSSLMODE
        value: require
      - key: STORAGE_DRIVER
        value: supabase
      - key: SUPABASE_BUCKET
        value: equipment-images
